[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

; MCP servers start FIRST (priority 100) so they are ready before the API accepts traffic.
; The API (priority 200) starts after. The MCP client in the API also has retry logic
; with backoff, so even if there's a brief delay, tools will load correctly.

[program:mcp-travel]
command=python src/mcp/servers/travel.py
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

[program:mcp-comms]
command=python src/mcp/servers/comms.py
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

[program:mcp-search]
command=python src/mcp/servers/search.py
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

[program:api]
command=uvicorn src.main:app --host 0.0.0.0 --port 10000
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=200
