<svg width="820" height="476" viewBox="0 0 820 476" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#3a3d55"/>
    </marker>
    <marker id="arrG" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#c8a96e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="476" fill="#0c0d0f" rx="14"/>

  <!-- Title -->
  <text x="410" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8a96e" letter-spacing="3">TRAVELOPS · ARCHITECTURE</text>

  <!-- User -->
  <rect x="310" y="34" width="200" height="34" rx="8" fill="#1a1c24" stroke="#2e3045" stroke-width="1"/>
  <text x="410" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e8e6e0">User</text>
  <line x1="410" y1="68" x2="410" y2="87" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FastAPI -->
  <rect x="290" y="88" width="240" height="36" rx="8" fill="#1a1c24" stroke="#2e3045" stroke-width="1"/>
  <text x="410" y="104" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e8e6e0">FastAPI</text>
  <text x="410" y="118" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">/chat  thread management  CORS</text>
  <line x1="410" y1="124" x2="410" y2="144" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LangGraph Orchestrator -->
  <rect x="75" y="144" width="670" height="48" rx="8" fill="#1e2235" stroke="#c8a96e" stroke-width="1"/>
  <text x="410" y="163" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c8a96e">LangGraph Orchestrator</text>
  <text x="410" y="181" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">intent classification  state machine  postgres checkpointer</text>

  <!-- Straight verticals from orchestrator bottom to each agent -->
  <line x1="165" y1="192" x2="165" y2="230" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="192" x2="410" y2="230" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="655" y1="192" x2="655" y2="230" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Travel Agent -->
  <rect x="75" y="230" width="180" height="42" rx="8" fill="#1a2535" stroke="#6ba3d6" stroke-width="1"/>
  <text x="165" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6ba3d6">Travel Agent</text>
  <text x="165" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">ReAct  parallel tool calls</text>

  <!-- Reminder Agent -->
  <rect x="320" y="230" width="180" height="42" rx="8" fill="#1e1a2a" stroke="#9d7fd4" stroke-width="1"/>
  <text x="410" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#9d7fd4">Reminder Agent</text>
  <text x="410" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">extraction  APScheduler</text>

  <!-- Creative Agent -->
  <rect x="565" y="230" width="180" height="42" rx="8" fill="#1a2520" stroke="#6db88a" stroke-width="1"/>
  <text x="655" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6db88a">Creative Agent</text>
  <text x="655" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">prompt expansion  FLUX</text>

  <!-- Arrows down from agents to MCP layer -->
  <line x1="165" y1="272" x2="165" y2="308" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="272" x2="410" y2="302" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="655" y1="272" x2="655" y2="308" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MCP Travel Server -->
  <rect x="75" y="308" width="180" height="52" rx="8" fill="#13141a" stroke="#2e3045" stroke-width="1"/>
  <text x="165" y="326" text-anchor="middle" font-family="monospace" font-size="10" fill="#6ba3d6">MCP Travel Server</text>
  <text x="165" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">weather  flights  hotels</text>
  <text x="165" y="353" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">WeatherAPI  RapidAPI</text>

  <!-- HITL -->
  <rect x="320" y="302" width="180" height="38" rx="8" fill="#1e1a10" stroke="#c8a96e" stroke-width="1.5"/>
  <text x="410" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c8a96e">Human-in-the-Loop</text>
  <text x="410" y="332" text-anchor="middle" font-family="monospace" font-size="9" fill="#9996a0">approve before send</text>

  <!-- HITL dashed arrow to MCP Comms -->
  <line x1="410" y1="340" x2="410" y2="364" stroke="#c8a96e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrG)"/>

  <!-- MCP Comms Server -->
  <rect x="320" y="364" width="180" height="40" rx="8" fill="#13141a" stroke="#2e3045" stroke-width="1"/>
  <text x="410" y="381" text-anchor="middle" font-family="monospace" font-size="10" fill="#9d7fd4">MCP Comms Server</text>
  <text x="410" y="395" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">Telegram Bot API</text>

  <!-- MCP Moodboard Server -->
  <rect x="565" y="308" width="180" height="52" rx="8" fill="#13141a" stroke="#2e3045" stroke-width="1"/>
  <text x="655" y="326" text-anchor="middle" font-family="monospace" font-size="10" fill="#6db88a">MCP Moodboard Server</text>
  <text x="655" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">fal.ai FLUX schnell</text>
  <text x="655" y="353" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a5870">image generation</text>

  <!-- Output arrows -->
  <line x1="165" y1="360" x2="165" y2="394" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="404" x2="410" y2="430" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="655" y1="360" x2="655" y2="394" stroke="#3a3d55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output labels -->
  <rect x="90" y="394" width="150" height="30" rx="6" fill="#13141a" stroke="#222430" stroke-width="1"/>
  <text x="165" y="413" text-anchor="middle" font-family="monospace" font-size="9" fill="#9996a0">chat response</text>

  <rect x="335" y="430" width="150" height="30" rx="6" fill="#13141a" stroke="#222430" stroke-width="1"/>
  <text x="410" y="449" text-anchor="middle" font-family="monospace" font-size="9" fill="#9996a0">telegram message</text>

  <rect x="580" y="394" width="150" height="30" rx="6" fill="#13141a" stroke="#222430" stroke-width="1"/>
  <text x="655" y="413" text-anchor="middle" font-family="monospace" font-size="9" fill="#9996a0">generated images</text>
</svg>