services:
  - type: web
    name: travel-planner-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: python -u -m uvicorn src.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: GROQ_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: false
