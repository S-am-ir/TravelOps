services:
  - type: web
    name: travel-planner-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: supervisord -c /app/supervisord.conf
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: GROQ_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: MCP_DIRECT
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: false
